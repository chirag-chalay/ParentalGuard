# ============================================================
# gradle/wrapper/gradle-wrapper.properties
#
# The Gradle Wrapper ensures every developer (and CI server)
# uses the EXACT same Gradle version, regardless of what's
# installed on their machine.
#
# When you run "./gradlew build", the wrapper:
#   1. Reads this file to find the correct Gradle version
#   2. Downloads it automatically if not cached locally
#   3. Runs the build with that exact version
#
# This prevents "it works on my machine" build failures.
# ============================================================

# Where Gradle stores its local cache files
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists

# The exact Gradle version to use.
# Must be compatible with the Android Gradle Plugin version
# specified in the root build.gradle (AGP 8.2.0 → Gradle 8.2+)
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip

# Where the zip file is stored locally
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
